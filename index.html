// ── Storage helpers (Firebase or localStorage fallback) ───────────
const storage = {
  async get(key) {
    if (USE_FIREBASE) {
      const snap = await db.ref(key).once("value");
      return snap.val();
    }
    const v = localStorage.getItem("canje_" + key);
    return v ? JSON.parse(v) : null;
  },
  async set(key, val) {
    if (USE_FIREBASE) {
      await db.ref(key).set(val);
    } else {
      localStorage.setItem("canje_" + key, JSON.stringify(val));
    }
  },
  onValue(key, cb) {
    if (USE_FIREBASE) {
      db.ref(key).on("value", snap => cb(snap.val() || {}));
      return () => db.ref(key).off("value");
    }
    // localStorage fallback: just call once
    const v = localStorage.getItem("canje_" + key);
    cb(v ? JSON.parse(v) : {});
    // Poll for changes every 3 seconds
    const interval = setInterval(() => {
      const v2 = localStorage.getItem("canje_" + key);
      cb(v2 ? JSON.parse(v2) : {});
    }, 3000);
    return () => clearInterval(interval);
  }
};

// ── Product Image Component (fetches from Mercado Libre) ──────────
const imgCache = {};
function ProductImage({brand, model, emoji}) {
  const [src, setSrc] = useState(imgCache[brand+"_"+model] || null);
  const [err, setErr] = useState(false);
  useEffect(() => {
    const key = brand+"_"+model;
    if (imgCache[key]) { setSrc(imgCache[key]); return; }
    let cancelled = false;
    fetch("https://api.mercadolibre.com/sites/MLA/search?q="+encodeURIComponent(brand+" "+model)+"&limit=1")
      .then(r=>r.json())
      .then(data=>{
        if (cancelled) return;
        if (data.results && data.results[0] && data.results[0].thumbnail) {
          const url = data.results[0].thumbnail.replace("http://","https://").replace("-I.jpg","-O.jpg");
          imgCache[key] = url;
          setSrc(url);
        } else { setErr(true); }
      })
      .catch(()=>{ if(!cancelled) setErr(true); });
    return ()=>{ cancelled=true; };
  }, [brand, model]);
  if (err || !src) return <div style={{fontSize:84,lineHeight:1}}>{emoji}</div>;
  return <img src={src} alt={model} style={{maxHeight:100,maxWidth:160,objectFit:"contain",filter:"drop-shadow(0 4px 12px rgba(0,0,0,.3))"}} onError={()=>setErr(true)} />;
}

        if (!data.batch_2) data.batch_2 = { label:"Pedido 2 (actual)", sent:null, orders:{} };
        if (!data.batch_2.orders) data.batch_2.orders = {};
        setBatches(data);
        setLoading(false);
      } else if (!didMigrate) {
        didMigrate = true;
        // Migrate old orders
        storage.get("orders").then(oldOrders => {
          const migrated = {};
          if (oldOrders && typeof oldOrders === "object") {
            Object.entries(oldOrders).forEach(([key, items]) => {
              if (items && typeof items === "object") {
                migrated[key] = { items, date: "2026-04-13" };
              }
            });
          }
          const newBatches = {
            batch_1: { label: "Pedido 1 (enviado 13/04)", sent: "2026-04-13", orders: migrated },
            batch_2: { label: "Pedido 2 (actual)", sent: null, orders: {} }
          };
          storage.set("batches", newBatches);
          setBatches(newBatches);
          setLoading(false);
        }).catch(() => {
          const newBatches = {
            batch_1: { label: "Pedido 1 (enviado 13/04)", sent: "2026-04-13", orders: {} },
            batch_2: { label: "Pedido 2 (actual)", sent: null, orders: {} }
          };
          storage.set("batches", newBatches);
          setBatches(newBatches);
          setLoading(false);
        });
      }
    });
    return () => { if (unsubBatches) unsubBatches(); };
  }, []);

  // Current batch orders
  const currentOrders = useMemo(() => {
    if (!batches || !batches[CURRENT_BATCH]) return {};
    return batches[CURRENT_BATCH].orders || {};
  }, [batches]);

  // Cart for current user
  const cart = useMemo(() => {
    if (!family || !member) return {};
    const od = currentOrders[family+"__"+member];
    return od ? (od.items || od) : {};
  }, [family, member, currentOrders]);

  const cartTotal = useMemo(() =>
    Object.entries(cart).reduce((s,[id,q]) => { const p=PRODUCTS.find(x=>x.id===id); return s+(p?p.price*q:0); },0), [cart]);
  const cartCount = useMemo(() => Object.values(cart).reduce((s,q)=>s+q,0), [cart]);

  const saveBatches = useCallback((newBatches) => {
    setBatches(newBatches);
    storage.set("batches", newBatches);
  }, []);

  const saveCart = useCallback((newItems) => {
    try {
      const key = family+"__"+member;
      const nb = JSON.parse(JSON.stringify(batches));
      if (!nb[CURRENT_BATCH]) nb[CURRENT_BATCH] = { label:"Pedido 2 (actual)", sent:null, orders:{} };
      if (!nb[CURRENT_BATCH].orders) nb[CURRENT_BATCH].orders = {};
      if (Object.keys(newItems).length === 0) {
        delete nb[CURRENT_BATCH].orders[key];
      } else {
        nb[CURRENT_BATCH].orders[key] = { items: newItems, date: new Date().toISOString().slice(0,10) };
      }
      saveBatches(nb);
    } catch(e) { alert("Error al guardar: "+e.message); }
  }, [family, member, batches, saveBatches]);

  const addToCart = (id) => {
    try {
      const p = PRODUCTS.find(x=>x.id===id);
      if (!p) { alert("Producto no encontrado"); return; }
      if (cartTotal + p.price > BUDGET) { showToast("⚠️ Supera el presupuesto de "+fmt(BUDGET)); return; }
      if (!family || !member) { alert("Seleccioná familia y miembro primero"); return; }
      const newCart = {...cart, [id]: (cart[id]||0)+1};
      saveCart(newCart);
      showToast("✓ "+p.name+" agregado");
    } catch(e) { alert("Error: "+e.message); }
  };
  const removeFromCart = (id) => {
    if (!cart[id]) return;
    const nc = {...cart};
    if (nc[id]<=1) delete nc[id]; else nc[id]--;
    saveCart(nc);
  };
  const removeAllOfItem = (id) => {
    const nc = {...cart};
    delete nc[id];
    saveCart(nc);
  };

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""),2000); };

  const filteredProducts = useMemo(() =>
    PRODUCTS.filter(p => {
      if (brandFilter!=="all" && p.brand!==brandFilter) return false;
      if (catFilter!=="all" && p.cat!==catFilter) return false;
      if (search) { const q=search.toLowerCase(); return p.name.toLowerCase().includes(q)||p.model.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q); }
      return true;
    }), [brandFilter,catFilter,search]);

  // Helper: get orders for a batch
  const getBatchOrders = (batchKey) => {
    if (!batches || !batches[batchKey]) return {};
    return batches[batchKey].orders || {};
  };
  const getBatchLabel = (batchKey) => {
    if (!batches || !batches[batchKey]) return batchKey;
    return batches[batchKey].label || batchKey;
  };

  if (loading || !batches) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0a0a0a",color:"#f0ece5",fontFamily:"'DM Serif Display',serif",fontSize:27}}>Cargando...</div>;

  // ── LOGIN ──
  if (view==="login") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#0a0a0a 0%,#1a1510 50%,#0a0a0a 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:480,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:48}}>
          <div style={{fontSize:20,letterSpacing:6,color:"#b89868",textTransform:"uppercase",marginBottom:12}}>Filmsuez</div>
          <h1 style={{fontSize:57,color:"#f0ece5",margin:0,lineHeight:1.1}}>Sistema de Canjes</h1>
          <div style={{width:60,height:1,background:"#b89868",margin:"20px auto"}}/>
          <p style={{color:"#d5cfc5",fontSize:21}}>2026 — Electrodomésticos</p>
          {!USE_FIREBASE && <p style={{color:"#c06040",fontSize:18,marginTop:8}}>⚠ Modo local — los datos se guardan solo en este dispositivo</p>}
        </div>
        <div style={{background:"#141210",border:"1px solid #2a2520",borderRadius:12,padding:32}}>
          <label style={{display:"block",color:"#b89868",fontSize:20,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Familia</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:24}}>
            {Object.keys(FAMILIES).map(f=>(
              <button key={f} onClick={()=>{setFamily(f);setMember("");}} style={{padding:"14px 12px",borderRadius:8,border:family===f?"1px solid #b89868":"1px solid #2a2520",background:family===f?"#1e1a14":"transparent",color:family===f?"#f0ece5":"#d5cfc5",cursor:"pointer",fontSize:24,transition:"all .2s"}}>{f}</button>
            ))}
          </div>
          {family && <>
            <label style={{display:"block",color:"#b89868",fontSize:20,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>¿Quién sos?</label>

              {FAMILIES[family].map(m=>(
                <button key={m} onClick={()=>setMember(m)} style={{padding:"12px 20px",borderRadius:8,border:member===m?"1px solid #b89868":"1px solid #2a2520",background:member===m?"#1e1a14":"transparent",color:member===m?"#f0ece5":"#d5cfc5",cursor:"pointer",fontSize:26,transition:"all .2s"}}>{m}</button>

            </div>

        </div>
      </div>
    </div>
  );

  // ── ADMIN ──
  if (view==="admin") {

          </div>

                  const items = od.items || od;
                  const orderDate = od.date || "—";
                  const mt=Object.entries(items).reduce((s,[pid,q])=>{const p=PRODUCTS.find(x=>x.id===pid);return s+(p?p.price*q:0);},0);
                  return (<div key={mem} style={{borderTop:"1px solid #1e1a14",paddingTop:12,marginTop:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:4}}>
                      <span style={{color:"#c0a070",fontSize:22,fontWeight:600}}>{mem}</span>
                      <span style={{color:"#b0a898",fontSize:18}}>📅 {orderDate} — {fmt(mt)}</span>
                    </div>
                    {Object.entries(items).map(([pid,q])=>{const p=PRODUCTS.find(x=>x.id===pid);if(!p)return null;return <div key={pid} style={{display:"flex",justifyContent:"space-between",padding:"4px 0 4px 16px",fontSize:20,color:"#d5cfc5"}}><span>{q}x {p.brand} {p.model} — {p.name}</span><span>{fmt(p.price*q)}</span></div>;})}
                  </div>);
                })}
              </div>);
          })}

          {Object.keys(allAgg).length>0 && (
            <div style={{background:"#141210",border:"1px solid #2a2520",borderRadius:12,padding:24,marginTop:32}}>
              <h2 style={{fontSize:30,margin:"0 0 16px"}}>Consolidado — {getBatchLabel(adminBatch)}</h2>
              {Object.entries(allAgg).sort((a,b)=>{const pa=PRODUCTS.find(x=>x.id===a[0]),pb=PRODUCTS.find(x=>x.id===b[0]);return(pa?.brand||"").localeCompare(pb?.brand||"");}).map(([pid,q])=>{
                const p=PRODUCTS.find(x=>x.id===pid);if(!p)return null;
                return <div key={pid} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",fontSize:20,color:"#d5cfc5",borderBottom:"1px solid #1a1814"}}><span><strong style={{color:"#f0ece5",fontSize:22}}>{q}x</strong> [{p.brand}] {p.name} <span style={{color:"#b0a898"}}>({p.model})</span></span><span style={{color:"#c0a070",whiteSpace:"nowrap",marginLeft:12}}>{fmt(p.price*q)}</span></div>;
              })}
              <div style={{borderTop:"1px solid #2a2520",marginTop:16,paddingTop:12,display:"flex",justifyContent:"space-between",fontSize:24}}><span style={{color:"#b89868"}}>Total</span><span style={{fontWeight:600}}>{fmt(Object.entries(allAgg).reduce((s,[pid,q])=>{const p=PRODUCTS.find(x=>x.id===pid);return s+(p?p.price*q:0);},0))}</span></div>
            </div>
          )}

          <div style={{display:"flex",gap:12,marginTop:24,flexWrap:"wrap"}}>
            <button onClick={()=>{
              const bo = getBatchOrders(adminBatch);
              const oByF = {};
              Object.entries(bo).forEach(([k,od])=>{ const [f,m]=k.split("__"); if(!oByF[f])oByF[f]={}; oByF[f][m]=od; });
              const agg = {};
              Object.values(bo).forEach(od=>{const items=od.items||od;Object.entries(items).forEach(([pid,qty])=>{agg[pid]=(agg[pid]||0)+qty;});});
              const wb = XLSX.utils.book_new();
              const detRows = [["Familia","Miembro","Fecha","Marca","Modelo","Producto","Cantidad","Precio Unit.","Subtotal"]];
              Object.entries(bo).forEach(([k,od])=>{
                const [fam,mem]=k.split("__"); const items=od.items||od; const dt=od.date||"—";
                Object.entries(items).forEach(([pid,q])=>{ const p=PRODUCTS.find(x=>x.id===pid); if(p) detRows.push([fam,mem,dt,p.brand,p.model,p.name,q,p.price,p.price*q]); });
              });
              const ws1=XLSX.utils.aoa_to_sheet(detRows); ws1["!cols"]=[{wch:12},{wch:12},{wch:12},{wch:14},{wch:14},{wch:35},{wch:8},{wch:14},{wch:14}];
              XLSX.utils.book_append_sheet(wb,ws1,"Detalle");
              const consRows=[["Marca","Modelo","Producto","Cantidad Total","Precio Unit.","Subtotal"]];
              Object.entries(agg).sort((a,b)=>{const pa=PRODUCTS.find(x=>x.id===a[0]),pb=PRODUCTS.find(x=>x.id===b[0]);return(pa?.brand||"").localeCompare(pb?.brand||"");}).forEach(([pid,q])=>{const p=PRODUCTS.find(x=>x.id===pid);if(p)consRows.push([p.brand,p.model,p.name,q,p.price,p.price*q]);});
              consRows.push([]);consRows.push(["","","TOTAL","","",Object.entries(agg).reduce((s,[pid,q])=>{const p=PRODUCTS.find(x=>x.id===pid);return s+(p?p.price*q:0);},0)]);
              const ws2=XLSX.utils.aoa_to_sheet(consRows); ws2["!cols"]=[{wch:14},{wch:14},{wch:35},{wch:14},{wch:14},{wch:14}];
              XLSX.utils.book_append_sheet(wb,ws2,"Consolidado");
              const resRows=[["Familia","Total"]];
              Object.keys(FAMILIES).forEach(fam=>{const fo=oByF[fam]||{};const ft=Object.values(fo).reduce((s,od)=>{const items=od.items||od;return s+Object.entries(items).reduce((s2,[pid,q])=>{const p=PRODUCTS.find(x=>x.id===pid);return s2+(p?p.price*q:0);},0);},0);resRows.push([fam,ft]);});
              const ws3=XLSX.utils.aoa_to_sheet(resRows); ws3["!cols"]=[{wch:14},{wch:14}];
              XLSX.utils.book_append_sheet(wb,ws3,"Resumen Familias");
              XLSX.writeFile(wb,"Canjes_"+adminBatch+"_"+new Date().toISOString().slice(0,10)+".xlsx");
            }} style={{background:"linear-gradient(135deg,#b89868,#c0a070)",color:"#0a0a0a",border:"none",padding:"12px 24px",borderRadius:8,cursor:"pointer",fontSize:22,fontWeight:600}}>📥 Descargar Excel</button>
            <button onClick={()=>{if(confirm("¿Borrar pedidos de "+getBatchLabel(adminBatch)+"?")){const nb={...batches};nb[adminBatch].orders={};saveBatches(nb);}}} style={{background:"none",border:"1px solid #4a2020",color:"#8a4040",padding:"12px 20px",borderRadius:8,cursor:"pointer",fontSize:18}}>Resetear este pedido</button>
          </div>
        </div>
      </div>
    );
  }

  // ── CONFIRMED ──
  if (view==="confirmed") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#0a0a0a 0%,#1a1510 50%,#0a0a0a 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:520,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:72,marginBottom:16}}>✅</div>
        <h1 style={{fontSize:42,color:"#f0ece5",margin:"0 0 8px"}}>¡Selección confirmada!</h1>
        <p style={{color:"#b89868",fontSize:22,marginBottom:32}}>{member} — Familia {family}</p>
        <div style={{background:"#141210",border:"1px solid #2a2520",borderRadius:12,padding:24,textAlign:"left",marginBottom:24}}>
          {Object.entries(cart).map(([pid,q])=>{const p=PRODUCTS.find(x=>x.id===pid);if(!p)return null;return <div key={pid} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #1a1814",fontSize:20,color:"#e0dad0"}}><span><strong style={{color:"#f0ece5"}}>{q}x</strong> {p.name}</span><span style={{color:"#c0a070",whiteSpace:"nowrap",marginLeft:12}}>{fmt(p.price*q)}</span></div>;})}
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:16,marginTop:8,fontSize:24}}><span style={{color:"#b89868",fontWeight:600}}>Total</span><span style={{color:"#f0ece5",fontWeight:700}}>{fmt(cartTotal)}</span></div>
        </div>
        <p style={{color:"#b0a898",fontSize:18,marginBottom:24}}>Tu pedido quedó registrado. Podés cerrar esta página.</p>
        <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={()=>setView("catalog")} style={{background:"#1e1a14",border:"1px solid #2a2520",color:"#b89868",padding:"12px 24px",borderRadius:8,cursor:"pointer",fontSize:20}}>← Modificar</button>
          <button onClick={()=>{setView("login");setFamily("");setMember("");}} style={{background:"linear-gradient(135deg,#b89868,#c0a070)",color:"#0a0a0a",border:"none",padding:"12px 24px",borderRadius:8,cursor:"pointer",fontSize:22,fontWeight:600}}>Listo</button>
        </div>
      </div>
    </div>
  );

  // ── CATALOG ──
  const remaining=BUDGET-cartTotal, pct=(cartTotal/BUDGET)*100;
  return (
    <div style={{minHeight:"100vh",background:"#0a0a0a"}}>
      {/* Header */}
      <div style={{background:"#0e0d0b",borderBottom:"1px solid #1e1a14",padding:"12px 20px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div><span style={{fontSize:18,letterSpacing:3,color:"#b89868",textTransform:"uppercase"}}>{family}</span><span style={{color:"#3a3530",margin:"0 8px"}}>|</span><span style={{color:"#d5cfc5",fontSize:22,fontWeight:600}}>{member}</span></div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{textAlign:"right"}}><div style={{fontSize:16,color:remaining<100000?"#c06040":"#d5cfc5"}}>{cartCount} items</div><div style={{fontSize:24,fontWeight:700,color:remaining<100000?"#e07050":"#f0ece5"}}>{fmt(cartTotal)}</div></div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"16px 20px 120px"}}>

            const inCart=cart[p.id]||0, canAdd=cartTotal+p.price<=BUDGET;
            const brandColors = {"Crown":"#c43030","Ken Brown":"#2060a0","Ultracomb":"#b82020","Yelmo":"#2080a0"};
            const bc = brandColors[p.brand]||"#b89868";
            return (
              <div key={p.id} style={{background:"#141210",border:inCart>0?"2px solid #b89868":"1px solid #1e1a14",borderRadius:12,overflow:"hidden",display:"flex",flexDirection:"column",transition:"all .2s",position:"relative"}}>
                {inCart>0&&<div style={{position:"absolute",top:12,right:12,background:"#b89868",color:"#0a0a0a",borderRadius:14,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,zIndex:2}}>{inCart}</div>}
                <div style={{background:`linear-gradient(135deg, ${bc}15 0%, ${bc}08 50%, #14121000 100%)`,padding:"20px",display:"flex",alignItems:"center",justifyContent:"center",minHeight:130,position:"relative"}}>
                  <ProductImage brand={p.brand} model={p.model} emoji={p.img} />
                  <div style={{position:"absolute",top:10,left:12,fontSize:14,letterSpacing:2,color:bc,textTransform:"uppercase",fontWeight:700,opacity:.8}}>{p.brand}</div>
                </div>
                <div style={{padding:"14px 18px 18px",display:"flex",flexDirection:"column",flex:1}}>
                  <div style={{fontSize:24,color:"#f0ece5",fontWeight:700,marginBottom:4,lineHeight:1.3}}>{p.name}</div>
                  <div style={{fontSize:18,color:"#c0b8a8",marginBottom:4,flex:1}}>{p.model}</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                    <a href={"https://listado.mercadolibre.com.ar/"+encodeURIComponent(p.brand+" "+p.model)} target="_blank" rel="noopener" style={{fontSize:18,color:"#3483fa",textDecoration:"none"}}>🔍 ML</a>
                    {p.brand==="Ultracomb"&&<a href={"https://ultracomb.com.ar/?s="+encodeURIComponent(p.model.replace(" ","-"))} target="_blank" rel="noopener" style={{fontSize:18,color:"#e04040",textDecoration:"none"}}>🌐 Ultracomb</a>}
                    {p.brand==="Yelmo"&&<a href={"https://yelmo.com.ar/?s="+encodeURIComponent(p.model.replace(" ","-"))} target="_blank" rel="noopener" style={{fontSize:18,color:"#2090b0",textDecoration:"none"}}>🌐 Yelmo</a>}
                  </div>
                  <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{fontSize:28,color:"#c0a070",fontWeight:700}}>{fmt(p.price)}</div>
                    <div style={{fontSize:16,color:"#b0a898",background:"#1a1814",padding:"3px 8px",borderRadius:4}}>{p.cat}</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>addToCart(p.id)} disabled={!canAdd} style={{flex:1,padding:"12px",borderRadius:8,border:"none",background:canAdd?"#b89868":"#2a2520",color:canAdd?"#0a0a0a":"#b0a898",cursor:canAdd?"pointer":"not-allowed",fontSize:20,fontWeight:600}}>
                      {canAdd?(inCart>0?"+ Agregar otro":"Agregar"):"Sin cupo"}
                    </button>
                    {inCart>0&&<button onClick={()=>removeFromCart(p.id)} style={{padding:"12px 16px",borderRadius:8,border:"1px solid #3a2520",background:"transparent",color:"#c06040",cursor:"pointer",fontSize:24,fontWeight:700}}>−</button>}
                  </div>
                </div>
              </div>);
          })}
        </div>
      </div>

      {/* Collapsible floating cart */}
      {cartCount>0 && !cartOpen && (
        <div onClick={()=>setCartOpen(true)} style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",background:"#1e1a14",border:"2px solid #b89868",borderRadius:30,padding:"10px 24px",display:"flex",gap:14,alignItems:"center",boxShadow:"0 8px 32px rgba(0,0,0,.6)",zIndex:100,cursor:"pointer"}}>
          <span style={{fontSize:20}}>🛒</span>
          <span style={{color:"#f0ece5",fontSize:22,fontWeight:700}}>{cartCount}</span>
          <span style={{color:"#c0a070",fontSize:20,fontWeight:600}}>{fmt(cartTotal)}</span>
          <span style={{color:"#b0a898",fontSize:16}}>▲</span>
        </div>
      )}

      {cartCount>0 && cartOpen && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#141210",border:"2px solid #b89868",borderRadius:"16px 16px 0 0",boxShadow:"0 -8px 32px rgba(0,0,0,.6)",zIndex:100,maxHeight:"60vh",display:"flex",flexDirection:"column"}}>
          <div onClick={()=>setCartOpen(false)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 20px",cursor:"pointer",borderBottom:"1px solid #2a2520"}}>
            <span style={{color:"#b89868",fontSize:20,fontWeight:600}}>🛒 Mi selección ({cartCount})</span>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{color:"#f0ece5",fontSize:22,fontWeight:700}}>{fmt(cartTotal)}</span>
              <span style={{color:"#b0a898",fontSize:16}}>▼</span>
            </div>
          </div>
          <div style={{overflow:"auto",padding:"8px 20px 8px"}}>
            {Object.entries(cart).map(([pid,q])=>{const p=PRODUCTS.find(x=>x.id===pid);if(!p)return null;return (
              <div key={pid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1a1814",gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:18,color:"#f0ece5",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{q}x {p.name}</div>
                  <div style={{fontSize:16,color:"#b0a898"}}>{fmt(p.price*q)}</div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button onClick={()=>removeFromCart(pid)} style={{width:34,height:34,borderRadius:8,border:"1px solid #3a2520",background:"transparent",color:"#c06040",cursor:"pointer",fontSize:20,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <button onClick={()=>addToCart(pid)} style={{width:34,height:34,borderRadius:8,border:"none",background:"#b89868",color:"#0a0a0a",cursor:"pointer",fontSize:20,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  <button onClick={()=>removeAllOfItem(pid)} style={{width:34,height:34,borderRadius:8,border:"1px solid #4a2020",background:"transparent",color:"#8a4040",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              </div>);})}
          </div>
          <div style={{display:"flex",gap:8,padding:"10px 20px",borderTop:"1px solid #2a2520",flexWrap:"wrap"}}>
            <span style={{color:remaining<100000?"#e07050":"#b0a898",fontSize:16,flex:1}}>Quedan {fmt(remaining)}</span>
            <button onClick={()=>{if(confirm("¿Confirmar selección?")){setCartOpen(false);setView("confirmed");}}} style={{background:"linear-gradient(135deg,#b89868,#c0a070)",color:"#0a0a0a",border:"none",padding:"8px 16px",borderRadius:6,cursor:"pointer",fontSize:18,fontWeight:700}}>Finalizar ✓</button>
            <button onClick={()=>{if(confirm("¿Cancelar y borrar todo?")){setCartOpen(false);saveCart({});setView("login");setFamily("");setMember("");}}} style={{background:"none",border:"1px solid #4a2520",color:"#c06040",padding:"8px 14px",borderRadius:6,cursor:"pointer",fontSize:16}}>Cancelar</button>
          </div>
        </div>
      )}

      {cartCount===0&&(
        <div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",background:"#1e1a14",border:"1px solid #2a2520",borderRadius:30,padding:"10px 24px",display:"flex",gap:14,alignItems:"center",boxShadow:"0 8px 32px rgba(0,0,0,.6)",zIndex:100}}>
          <span style={{color:"#b0a898",fontSize:18}}>Seleccioná productos del catálogo</span>
          <button onClick={()=>{setView("login");setFamily("");setMember("");}} style={{background:"none",border:"1px solid #2a2520",color:"#d5cfc5",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:16}}>Salir</button>
        </div>
      )}

      {toast&&<div style={{position:"fixed",top:130,left:"50%",transform:"translateX(-50%)",background:"#1e1a14",border:"1px solid #b89868",borderRadius:8,padding:"10px 20px",color:"#f0ece5",fontSize:18,zIndex:200,boxShadow:"0 4px 16px rgba(0,0,0,.4)"}} className="fade-in">{toast}</div>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
